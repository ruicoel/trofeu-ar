<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troféu em Realidade Aumentada</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #f0f0f0; }
        model-viewer { width: 100%; height: 100%; }
        
        /* Forçamos o botão a ficar visível na tela, ignorando o bloqueio do navegador */
        #ar-button { 
            display: block !important; 
            background-color: #4285F4; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            padding: 12px 24px; 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 16px; 
            font-weight: bold; 
            z-index: 9999; 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <model-viewer 
<model-viewer 
    src="3d-metal-trophy.glb" 
    ar 
    ar-modes="scene-viewer" 
    camera-controls 
    shadow-intensity="1" 
    auto-rotate>
    
    <button slot="ar-button" id="ar-button">
            Ver no seu espaço 🏆
        </button>
        
    </model-viewer>

</body>
</html>

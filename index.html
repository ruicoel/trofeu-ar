<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias do Rui</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer@1.12.0/dist/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .tela-texto {
            width: 60%;
            max-width: 200px;
            text-align: center;
            z-index: 10;
        }

        /* Ajuste do tamanho da sua imagem para caber bem na tela */
        .imagem-instrucao {
            width: 100%;
            max-width: 300px;
            height: auto;
            margin-bottom: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        p {
            font-size: 18px;
            color: #ffffff;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-texto {
            background-color: #00d2ff;
            color: #121212;
            font-weight: bold;
            font-size: 16px;
            border: none;
            padding: 16px 32px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            transition: 0.2s;
        }

        .btn-texto:active {
            transform: scale(0.95);
        }

        /* O modelo 3D fica escondido na tela, esperando o clique */
        model-viewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0; 
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div class="tela-texto">
        <img class="imagem-instrucao" src="1.png" alt="Instruções de como apontar a câmera">

        <p>Veja no Holograma o que o Rui Coelho está fazendo neste exato momento em suas férias, clique no botão abaixo.</p>
        
        <button id="botao-ar" class="btn-texto" onclick="ativarAR_Direto()">
         CLIQUE PARA VER:
        </button>
    </div>

    <model-viewer 
      id="meu-modelo"
      src="https://drive.google.com/uc?export=download&id=1mBbaXkmnrDfEFl-8CvV3RYexDQI9UXJD" 
      ar 
      ar-modes="scene-viewer quick-look" 
      camera-controls>
    </model-viewer>

    <script>
        function ativarAR_Direto() {
            const mv = document.querySelector('#meu-modelo');
            const btn = document.querySelector('#botao-ar');

            // Feedback visual no botão
            btn.innerText = "Iniciando câmera...";

            // Dispara a câmera AR diretamente
            mv.activateAR();

            // Retorna o botão ao normal após um tempo
            setTimeout(() => {
                btn.innerText = "Para isso:";
            }, 3000);
        }
    </script>

</body>
</html>

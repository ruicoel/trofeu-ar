<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste 3D Definitivo</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer@1.12.0/dist/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .caixa-aviso {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            max-width: 400px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        /* O tamanho do visualizador precisa ser grande para o botão aparecer */
        model-viewer {
            width: 100%;
            max-width: 400px;
            height: 400px;
            background-color: #222;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="caixa-aviso">
        <h3>⚠️ Instruções Importantes</h3>
        <p>Gire o astronauta abaixo com o dedo para testar. Para abrir a câmera, clique no <strong>botão flutuante redondo</strong> que vai aparecer bem no meio ou no canto do objeto 3D.</p>
    </div>

    <model-viewer 
      src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
      ar 
      ar-modes="webxr scene-viewer quick-look" 
      camera-controls 
      auto-rotate>
    </model-viewer>

</body>
</html>

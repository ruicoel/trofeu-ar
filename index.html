<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troféu em Realidade Aumentada</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background-color: #f0f0f0; 
        }
        model-viewer { 
            width: 100%; 
            height: 100%; 
        }
       #ar-button { 
    background-color: #4285F4; 
    color: white; 
    border: none; 
    border-radius: 8px; 
    padding: 18px 36px; 
    position: absolute; 
    top: 150px;                 /* Aumente este número para descer o botão */
    left: 50%; 
    transform: translateX(-50%); 
    font-size: 20px; 
    font-weight: bold; 
    z-index: 9999; 
}
    </style>
</head>
<body>

    <model-viewer 
        src="3d-metal-trophy.glb" 
        ar 
        ar-modes="scene-viewer webxr" 
        camera-controls 
        shadow-intensity="1" 
        auto-rotate>
        
        <button slot="ar-button" id="ar-button">
            Ver no seu espaço 🏆
        </button>
        
    </model-viewer>

</body>
</html>

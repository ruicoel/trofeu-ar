<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiência RA</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer@1.12.0/dist/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 1px solid #2d2d2d;
        }

        h2 {
            margin-top: 0;
            color: #00d2ff;
        }

        p {
            color: #b3b3b3;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-iniciar {
            background-color: #00d2ff;
            color: #121212;
            font-weight: bold;
            font-size: 16px;
            border: none;
            padding: 16px 32px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            transition: background-color 0.2s;
        }

        .btn-iniciar:active {
            background-color: #00b4db;
        }

        /* Área secreta onde o objeto vai nascer e sumir rapidamente */
        #palco-invisivel {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Portal de Realidade Aumentada</h2>
        <p>Ao clicar no botão abaixo, o sistema ativará a câmera do seu celular para projetar o objeto 3D diretamente no seu ambiente físico.</p>
        
        <button class="btn-iniciar" onclick="dispararRA_Direto()">
          🚀 Iniciar Experiência AR
        </button>
    </div>

    <div id="palco-invisivel"></div>

    <script>
        function dispararRA_Direto() {
            const palco = document.getElementById('palco-invisivel');
            
            // Se já tiver um modelo ali, remove para não acumular
            palco.innerHTML = '';

            // 1. Criamos o elemento do Google do zero na memória
            const mv = document.createElement('model-viewer');
            
            // 2. Configuramos as propriedades dele (Troque o src pelo seu link quando quiser)
            mv.setAttribute('src', 'https://modelviewer.dev/shared-assets/models/Astronaut.glb');
            mv.setAttribute('ar', '');
            mv.setAttribute('ar-modes', 'webxr scene-viewer quick-look');
            
            // 3. Jogamos ele no palco invisível
            palco.appendChild(mv);

            // 4. O "pulo do gato": assim que o elemento nasce, damos a ordem para abrir a câmera imediatamente
            mv.addEventListener('load', () => {
                setTimeout(() => {
                    mv.activateAR();
                }, 100); // Um微 milissegundo apenas para o celular respirar
            });
        }
    </script>

</body>
</html>

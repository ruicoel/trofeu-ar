<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias do Rui</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer@1.12.0/dist/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #121212; /* Fundo escuro para destacar as letras */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Tela 100% limpa: apenas o texto centralizado e o botão */
        .tela-texto {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* Estilo da imagem adicionada */
        .imagem-instrucao {
            width: 100%;
            max-width: 250px;
            height: auto;
            margin-bottom: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        p {
            font-size: 18px;
            color: #ffffff;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: normal;
        }

        /* Botão simples e direto */
        .btn-texto {
            background-color: #00d2ff;
            color: #121212;
            font-weight: bold;
            font-size: 16px;
            border: none;
            padding: 16px 32px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
        }

        /* Segunda tela (pop-up) onde o modelo carrega */
        .modal-3d {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        model-viewer {
            width: 100%;
            max-width: 450px;
            height: 80vh;
            background-color: #121212;
        }

        .texto-ajuda {
            text-align: center;
            margin-bottom: 20px;
            font-size: 16px;
            color: #00d2ff;
        }
    </style>
</head>
<body>

    <div id="tela-inicial" class="tela-texto">
        <img class="imagem-instrucao" src="https://drive.google.com/uc?export=view&id=12OYAyXlvXsVVppJLHU4sJNkrtvHTlT69" alt="Homem apontando o celular">

        <p>Veja online o que o rui está fazendo nesse momento em suas ferias.</p>
        
        <button class="btn-texto" onclick="abrirPlayer3D()">
         Para isso:
        </button>
    </div>

    <div id="janela-modal" class="modal-3d">
        <div class="texto-ajuda">
            Clique no ícone de cubo para abrir a câmera:
        </div>
        
        <model-viewer 
          src="https://drive.google.com/uc?export=download&id=1mBbaXkmnrDfEFl-8CvV3RYexDQI9UXJD"  
          ar 
          ar-modes="scene-viewer quick-look" 
          camera-controls 
          auto-rotate>
        </model-viewer>
    </div>

    <script>
        function abrirPlayer3D() {
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('janela-modal').style.display = 'flex';
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiência RA Segura</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer@1.12.0/dist/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* TELA 1: APENAS O SEU AVISO */
        .container-aviso {
            width: 90%;
            max-width: 400px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 1px solid #2d2d2d;
        }

        h2 {
            margin-top: 0;
            color: #00d2ff;
        }

        p {
            color: #b3b3b3;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-prosseguir {
            background-color: #00d2ff;
            color: #121212;
            font-weight: bold;
            font-size: 16px;
            border: none;
            padding: 16px 32px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        /* TELA 2: POP-UP QUE APARECE DEPOIS DO CLIQUE (MODAL) */
        .modal-3d {
            display: none; /* Começa escondido */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Estilo do visualizador dentro do Pop-up */
        model-viewer {
            width: 100%;
            max-width: 450px;
            height: 70vh;
            background-color: #1e1e1e;
            border-radius: 12px;
            border: 1px solid #333;
        }
